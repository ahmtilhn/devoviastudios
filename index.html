<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Devovia Studio is the public home for our Google Play and future iOS mobile apps, games, privacy policies, customer agreements, product updates and support." />
    <meta name="theme-color" content="#070b1f" />

    <form name="contact" netlify netlify-honeypot="bot-field" hidden>

        <option>Privacy policy question</option>
        <option>Customer agreement</option>
        <option>Bug report</option>
        <option>Feature request</option>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
