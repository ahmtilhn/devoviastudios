name: Production-origin attachment diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  production-browser-api:
    if: github.head_ref == 'verify/file-attachments-build'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run production-origin browser check
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL 'https://raw.githubusercontent.com/ahmtilhn/devoviastudios/verify/file-attachments-build/scripts/one-time-production-origin-check.mjs' -o /tmp/production-origin-check.mjs
          node /tmp/production-origin-check.mjs
