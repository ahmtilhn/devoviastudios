name: Validate website

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Extract Daily Hadith privacy policy
        run: node scripts/fetch-daily-policy.mjs > daily-hadith-policy.txt
      - name: Post extracted policy to this draft PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file daily-hadith-policy.txt
