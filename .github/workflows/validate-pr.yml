name: Validate website

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: UX contract pass 1
        run: npm run test:ux
      - name: Native engine and English pass 1
        run: node scripts/native-engine-check.mjs
      - name: V6 compatibility and privacy pass 1
        run: node scripts/v6-experience-check.mjs
      - name: V7 authentic product pass 1
        run: npm run test:v7
      - name: Premium motion and language pass 1
        run: npm run test:v8
      - name: Contextual motion V10 contract
        run: node scripts/motion-v10-check.mjs
      - name: Global pointer V11 contract
        run: node scripts/pointer-v11-check.mjs
      - name: Production build and repeated UX checks
        run: npm run build
      - name: Static route link and motion integrity
        run: node scripts/site-integrity-check.mjs
      - name: Native engine and English pass 2
        run: node scripts/native-engine-check.mjs
      - name: V6 compatibility and privacy pass 2
        run: node scripts/v6-experience-check.mjs
      - name: V7 authentic product pass 2
        run: npm run test:v7
      - name: Premium motion and language pass 2
        run: npm run test:v8
      - name: Contextual motion V10 contract pass 2
        run: node scripts/motion-v10-check.mjs
      - name: Global pointer V11 contract pass 2
        run: node scripts/pointer-v11-check.mjs

  browser-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Build production output
        run: npm run build >/dev/null
      - name: Broad Chromium route and control inventory
        run: node scripts/run-browser-audit.mjs
      - name: Focused wait-aware interaction and transition audit
        run: node scripts/run-focused-audit.mjs
      - name: Global pointer Chromium audit
        run: node scripts/pointer-browser-check.mjs | tee pointer-audit-result.txt
      - name: Upload browser audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-result
          path: |
            audit-result.txt
            focused-audit-result.txt
            pointer-audit-result.txt
          retention-days: 1
          if-no-files-found: warn
