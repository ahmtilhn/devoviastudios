name: Validate website

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: UX contract pass 1
        run: npm run test:ux
      - name: Native engine and English pass 1
        run: node scripts/native-engine-check.mjs
      - name: Production build and UX contract pass 2
        run: npm run build
      - name: Native engine and English pass 2
        run: node scripts/native-engine-check.mjs
