name: One-time file attachment integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  attachment-api:
    if: github.head_ref == 'verify/file-attachments-build'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Submit a small attachment to Web3Forms
        shell: bash
        run: |
          set -u
          printf 'Devovia file attachment integration test.\n' > attachment-test.txt
          HTTP_STATUS=$(curl --silent --show-error --output response.json --write-out '%{http_code}' \
            -X POST 'https://api.web3forms.com/submit' \
            -F 'access_key=156fd324-7568-4397-adee-20b99ad68190' \
            -F 'subject=[QA] Devovia file attachment integration test' \
            -F 'from_name=Devovia Automated QA' \
            -F 'name=Automated QA' \
            -F 'email=info@devoviastudio.com' \
            -F 'message=Automated one-time verification of the website file attachment flow.' \
            -F 'attachment_1=@attachment-test.txt;type=text/plain')
          echo "HTTP_STATUS=${HTTP_STATUS}"
          cat response.json
          echo
          RESPONSE_JSON=$(cat response.json) node -e "const r=JSON.parse(process.env.RESPONSE_JSON);if(r.success!==true){console.error('WEB3FORMS_ERROR='+(r.message||'Unknown error'));process.exit(1)}"
